user  nginx;
worker_processes  auto;

# Use system CPU affinity for worker processes to boost performance
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  2048;
    use epoll;
    multi_accept on;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version details for security hardening
    server_tokens off;

    # Custom log format that captures request processing and backend latency
    log_format  detailed  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          'req_time=$request_time u_resp_time=$upstream_response_time gzip_ratio=$gzip_ratio';

    access_log  /var/log/nginx/access.log  detailed;

    # Performance optimizations
    sendfile        on;
    tcp_nopush     on;
    tcp_nodelay    on;

    # Buffer size management to mitigate buffer overflow attempts
    client_body_buffer_size 128k;
    client_header_buffer_size 16k;
    large_client_header_buffers 4 16k;

    # Connection and request timeouts to defend against Slowloris attacks
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # DDoS Mitigation: Define rate-limiting zone based on client IP
    limit_req_zone $binary_remote_addr zone=app_limit:10m rate=10r/s;
    limit_req_status 429;

    # Advanced Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # Upstream definition for Gunicorn running on the 'web' service
    upstream web_app {
        server web:8000;
        keepalive 32; # Keep-alive connections to upstream to improve latency
    }

    # =========================================================================
    # HTTP - Redirect to HTTPS
    # =========================================================================
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # =========================================================================
    # HTTPS / SSL Hardened Server Block
    # =========================================================================
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL Certificates path inside the container
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Redirect HTTP requests sent to HTTPS port (Error 497) to HTTPS
        error_page 497 https://$http_host$request_uri;

        # High security SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # SSL Session configuration to save handshake overhead
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Enable HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        client_max_body_size 50M;

        # Security Headers (Hardening)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

        # Static files serving (Direct & Cached)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            log_not_found off;
        }

        # Media uploads serving (Direct & Cached)
        location /media/ {
            alias /usr/share/nginx/html/media/;
            expires 7d;
            add_header Cache-Control "public, must-revalidate, proxy-revalidate";
            access_log off;
            log_not_found off;
        }

        # Healthcheck endpoint (Quick bypass for load balancers)
        location /healthz {
            access_log off;
            return 200 "healthy\n";
        }

        # Dynamic site locations (proxied to Django/Wagtail via Gunicorn)
        location / {
            # Apply rate limiting zone
            limit_req zone=app_limit burst=20 nodelay;

            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Connection ""; # Clear Connection header for upstream keepalive
            
            # Proxy headers mapping
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_redirect off;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
        }

        # Custom Error Handlers
        error_page 500 502 503 504 = @error_50x;

        location @error_50x {
            default_type text/html;
            return 502 '<!DOCTYPE html>
<html>
<head>
    <title>Service Temporarily Unavailable</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; padding: 150px; background-color: #f7f9fc; color: #2d3748; }
        h1 { font-size: 50px; color: #e53e3e; margin-bottom: 20px; }
        body { font-size: 20px; }
        a { color: #3182ce; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    </style>
</head>
<body>
    <div class="container">
        <h1>System Unavailable</h1>
        <p>We are currently experiencing a brief service interruption. Our engineers are investigating.</p>
        <p>Please try reloading this page in a few minutes.</p>
    </div>
</body>
</html>';
        }
    }
}
