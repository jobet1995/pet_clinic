{% load static wagtailcore_tags %}
<link rel="stylesheet" href="{% static 'css/faq.css' %}">
<section class="faq-section py-6 bg-white">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="display-5 fw-bold text-dark mb-3">{{ self.heading }}</h2>
            {% if self.subheading %}
                <p class="lead text-muted max-w-2xl mx-auto mb-4">{{ self.subheading }}</p>
            {% endif %}
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="input-group search-box-group shadow-sm rounded-pill overflow-hidden bg-light border p-1">
                        <span class="input-group-text bg-transparent border-0 ps-3 text-muted">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" id="faqSearchInput" class="form-control bg-transparent border-0 py-2 ps-2 shadow-none" placeholder="Search questions..." aria-label="Search questions">
                        <button class="btn btn-teal text-white rounded-pill px-4 btn-search-clear d-none" type="button">Clear</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mt-5">
            <div class="col-lg-9">
                <div class="accordion accordion-custom" id="faqAccordion">
                    {% for item in self.items %}
                        <div class="accordion-item faq-item border-0 mb-3 shadow-sm rounded-4 overflow-hidden" data-question="{{ item.question|lower }}">
                            <h3 class="accordion-header" id="heading-{{ forloop.counter }}">
                                <button class="accordion-button collapsed fw-semibold text-dark py-3 px-4" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-{{ forloop.counter }}" aria-expanded="false" aria-controls="collapse-{{ forloop.counter }}">
                                    {{ item.question }}
                                </button>
                            </h3>
                            <div id="collapse-{{ forloop.counter }}" class="accordion-collapse collapse" aria-labelledby="heading-{{ forloop.counter }}" data-bs-parent="#faqAccordion">
                                <div class="accordion-body text-muted px-4 pb-4 pt-1">
                                    {{ item.answer|richtext }}
                                </div>
                            </div>
                        </div>
                    {% endfor %}
                </div>
                <div class="text-center mt-4 d-none" id="faqNoResults">
                    <i class="fa-solid fa-circle-question fa-3x text-muted mb-3"></i>
                    <p class="lead text-muted">No answers match your search term.</p>
                </div>
            </div>
        </div>
    </div>
</section>
<script src="{% static 'js/faq.js' %}"></script>
